<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wendy's Tutoring Secure</title>

<style>
body{margin:0;font-family:sans-serif;background:#fff;color:#5A4A6A}
header{display:flex;justify-content:space-between;padding:15px;background:#E6E6FA}
.btn{background:#F9C7C2;padding:10px 18px;border-radius:25px;border:none;cursor:pointer}
.section{padding:40px}
.hidden{display:none}
input{padding:10px;margin:5px;width:90%}
</style>
</head>

<body>

<header>
<h2>🏆 Wendy's Tutoring</h2>
<button class="btn" onclick="openPayment()">Enroll</button>
</header>

<div class="section">
<h2>Login</h2>
<input id="username" placeholder="Student ID">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<div class="section hidden" id="dashboard">
<h2>Dashboard</h2>
<div id="welcome"></div>

<h3>Classes</h3>
<div id="classes"></div>

<h3>Notes</h3>
<div id="notes"></div>
</div>

<div class="section hidden" id="admin">
<h2>Admin Panel</h2>

<h3>Create Student</h3>
<input id="newUser" placeholder="Student ID">
<input id="newPass" placeholder="Password">
<button class="btn" onclick="createStudent()">Create</button>

<h3>Add Class</h3>
<input id="classTitle" placeholder="Title">
<input id="classLink" placeholder="Link">
<button class="btn" onclick="addClass()">Add</button>

<h3>Add Note</h3>
<input id="noteTitle" placeholder="Title">
<input id="noteLink" placeholder="Link">
<button class="btn" onclick="addNote()">Add</button>
</div>

<div id="paymentModal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000000aa;">
<div style="background:#fff;padding:20px;margin:100px auto;width:300px;text-align:center">
<h3>UPI Payment</h3>
<p>7498074775@ybl</p>
<button onclick="copyUPI()">Copy</button>
<button onclick="window.open('https://wa.me/917498074775')">I've Paid</button>
<button onclick="closePayment()">Close</button>
</div>
</div>

<script>

// LOGIN SYSTEM
function login(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;
let users=JSON.parse(localStorage.getItem('users')||'{}');

if(users[u] && users[u].password===p){
localStorage.setItem('currentUser',u);
document.getElementById('dashboard').classList.remove('hidden');
document.getElementById('welcome').innerText='Welcome '+u;
loadContent();
}else{
alert('Invalid login');
}
}

// LOAD CONTENT
function loadContent(){
let classes=JSON.parse(localStorage.getItem('classes')||'[]');
let notes=JSON.parse(localStorage.getItem('notes')||'[]');

let cDiv=document.getElementById('classes');
cDiv.innerHTML='';
classes.forEach(c=>{
let el=document.createElement('div');
el.innerHTML=`<a href="${c.link}" target="_blank">▶ ${c.title}</a>`;
cDiv.appendChild(el);
});

let nDiv=document.getElementById('notes');
nDiv.innerHTML='';
notes.forEach(n=>{
let el=document.createElement('div');
el.innerHTML=`<a href="${n.link}" target="_blank">📄 ${n.title}</a>`;
nDiv.appendChild(el);
});
}

// ADMIN FUNCTIONS
function createStudent(){
let u=document.getElementById('newUser').value;
let p=document.getElementById('newPass').value;
let users=JSON.parse(localStorage.getItem('users')||'{}');
users[u]={password:p};
localStorage.setItem('users',JSON.stringify(users));
alert('Student created');
}

function addClass(){
let t=document.getElementById('classTitle').value;
let l=document.getElementById('classLink').value;
let data=JSON.parse(localStorage.getItem('classes')||'[]');
data.push({title:t,link:l});
localStorage.setItem('classes',JSON.stringify(data));
alert('Class added');
}

function addNote(){
let t=document.getElementById('noteTitle').value;
let l=document.getElementById('noteLink').value;
let data=JSON.parse(localStorage.getItem('notes')||'[]');
data.push({title:t,link:l});
localStorage.setItem('notes',JSON.stringify(data));
alert('Note added');
}

// ADMIN ACCESS
if(window.location.search.includes('admin=1')){
document.getElementById('admin').classList.remove('hidden');
}

// PAYMENT
function openPayment(){document.getElementById('paymentModal').classList.remove('hidden')}
function closePayment(){document.getElementById('paymentModal').classList.add('hidden')}
function copyUPI(){navigator.clipboard.writeText('7498074775@ybl');alert('Copied')}

</script>

</body>
</html>
